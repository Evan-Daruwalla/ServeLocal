name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20.x', '22.x']
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
      - name: Syntax check
        run: node --check server.js
      - name: Install (zero runtime deps)
        run: npm install --no-audit --no-fund
      - name: Unit + integration + regression tests
        run: npm test

  coverage:
    name: Coverage thresholds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22.x'
      - name: Install (better-sqlite3 is a runtime dep, ADR-0013)
        run: npm install --no-audit --no-fund
      - name: Enforce coverage floor (lines 50% / branches 70% / functions 30%)
        run: npm run coverage:check

  resilience:
    name: Chaos / resilience
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22.x'
      - name: Install (better-sqlite3 is a runtime dep, ADR-0013)
        run: npm install --no-audit --no-fund
      - run: node scripts/chaos.js

  security:
    name: Dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22.x'
      - name: Generate lockfile (no deps to install)
        run: npm install --package-lock-only
      - name: npm audit (fail on high+)
        run: npm audit --audit-level=high
